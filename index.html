<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last PM v3.0.0 | AI Chief of Staff</title>
    <meta name="description" content="The Autonomous Product OS for Cursor & Claude.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body { max-width: 900px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        h1, h2, h3 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 40px; }
        code { background: #161b22; padding: 2px 5px; border-radius: 4px; color: #ffa657; }
        pre { background: #161b22; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #30363d; }
        blockquote { border-left: 4px solid #58a6ff; padding-left: 20px; color: #8b949e; font-style: italic; }
        .hero { text-align: center; padding: 60px 0; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 12px; margin-bottom: 40px; border: 1px solid #334155; }
        .hero h1 { border: none; color: white; margin: 0; font-size: 2.5em; }
        .btn { display: inline-block; background: #238636; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🚀 The Last PM v3.0.0</h1>
        <p>The Autonomous Product OS for Cursor & Claude.</p>
        <a href="https://github.com/YOUR-USERNAME/LastPM" class="btn">View on GitHub</a>
    </div>

    <div id="content">Loading the OS...</div>

    <script>
        // Fetches your actual README.md and renders it here
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            });
    </script>
</body>
</html>
